name: yuploaded
description: "YUPLOADED - Snap. Invoice. Get Paid."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  image_picker: ^1.2.3
  firebase_storage: ^12.4.10
  pdf: ^3.13.0
  path_provider: ^2.1.6
  share_plus: ^13.2.0
  http: ^1.6.0
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/icon.png"
    min_sdk_version: 21